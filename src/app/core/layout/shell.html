<div class="shell">
  <app-sidebar
    [items]="items"
    [activeId]="activeId()"
    [expanded]="menuExpandido()"
    (itemSelected)="navigate($event)"
  />
  <div class="shell__column">
    <app-topbar (menuToggled)="menuExpandido.set(!menuExpandido())" />
    <main class="shell__content">
      <router-outlet />
    </main>
  </div>
</div>
